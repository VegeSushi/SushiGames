services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_NAME=sushigames
      - DB_USER=root
      - DB_PASS=rootpassword
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: mariadb:11
    restart: always
    environment:
      - MARIADB_DATABASE=sushigames
      - MARIADB_ROOT_PASSWORD=rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: always
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
